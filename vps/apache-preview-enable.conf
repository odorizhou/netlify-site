# Netlify dashboard preview (included only when preview is "on").
# Installed as /etc/apache2/katago-vhost.d/preview.conf — see preview-apache.sh
#
# Local published bot stats JSON (publisher output under /workspace/publish)
Alias /preview-data/publish/ /workspace/publish/
<Directory /workspace/publish>
    Options +Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Netlify static preview — run: vps/preview-server.sh start
RedirectMatch 302 ^/preview$ /preview/
ProxyPass /preview/ http://127.0.0.1:4173/ retry=0 timeout=60
ProxyPassReverse /preview/ http://127.0.0.1:4173/
