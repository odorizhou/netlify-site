# Combined Apache configuration: katago-web-app + kgs-bot-monitor on port 6006
# External mapping: host port (e.g. 55492) -> internal port 6006 (Apache)
#
# Routes:
#   / (root)       → Redirects to /play
#   /play/*        → Katago frontend (static files at DocumentRoot)
#   /api/*         → Katago backend (127.0.0.1:4000)
#   /monitor/*     → kgs-bot-monitor backend (127.0.0.1:4001)
#
# Optional Netlify site preview (toggle without editing this file):
#   sudo vps/preview-apache.sh on|off|status
#   vps/preview-server.sh start|stop|status
#
# Installation:
#   sudo cp vps/katago-web-app-port6006.conf /etc/apache2/sites-available/
#   sudo a2ensite katago-web-app-port6006
#   sudo apache2ctl graceful

<VirtualHost *:6006>
    ServerAdmin webmaster@localhost
    ProxyPreserveHost On

    # =============================================================================
    # kgs-bot-monitor at /monitor (PRESERVES EXISTING SETUP - DO NOT REMOVE!)
    # Backend running on 127.0.0.1:4001 - handles both static files and API
    # =============================================================================
    ProxyTimeout 300

    ProxyPass /monitor http://127.0.0.1:4001/monitor retry=0 timeout=60
    ProxyPassReverse /monitor http://127.0.0.1:4001/monitor

    # Netlify preview: off when file is absent; enable with vps/preview-apache.sh on
    IncludeOptional /etc/apache2/katago-vhost.d/preview.conf

    # =============================================================================
    # katago-web-app at /play
    # =============================================================================

    ProxyPass /api http://127.0.0.1:4000/api
    ProxyPassReverse /api http://127.0.0.1:4000/api

    Alias /play/ /workspace/katago-web-app/frontend/build/
    <Directory /workspace/katago-web-app/frontend/build>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        FallbackResource /workspace/katago-web-app/frontend/build/index.html
    </Directory>

    RedirectMatch ^/$ /play/
    RedirectMatch ^/play$ /play/

    ErrorLog ${APACHE_LOG_DIR}/katago-monitor-error.log
    CustomLog ${APACHE_LOG_DIR}/katago-monitor-access.log combined
</VirtualHost>
